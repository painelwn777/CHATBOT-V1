<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>PAINEL WN 777</title>
<style>
:root {
--verde-whats: #075e54;
--verde-claro: #dcf8c6;
--verde-btn: #25d366;
--azul-whats: #34b7f1;
--fundo: #e5ddd5;
--texto: #000;
--branco: #fff;
}
@media (prefers-color-scheme: dark) {
:root {
--verde-whats: #128C7E;
--verde-claro: #25d366;
--fundo: #121212;
--texto: #eee;
--branco: #1e1e1e;
}
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--fundo); min-height: 100vh; display: flex; justify-content: center; }
.chat-container { width: 100%; max-width: 420px; height: 100vh; height: 100dvh; background: var(--branco); display: flex; flex-direction: column; position: relative; }
.chat-header { background: var(--verde-whats); color: #fff; padding: 12px 15px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; z-index: 10; }
.profile-photo { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.3); }
.chat-header h3 { font-size: 16px; }
.chat-header small { font-size: 12px; opacity: 0.9; }
.header-info { flex: 1; }
.messages { flex: 1; padding: 15px; overflow-y: auto; overflow-x: hidden; background: var(--fundo); -webkit-overflow-scrolling: touch; }
.message { max-width: 80%; padding: 8px 12px; border-radius: 18px; margin-bottom: 12px; font-size: 14.5px; word-wrap: break-word; }
.received { background: var(--branco); align-self: flex-start; }
.sent { background: var(--verde-claro); align-self: flex-end; margin-left: auto; }
.message small { font-size: 11px; color: #999; display: block; text-align: right; margin-top: 4px; }
.action-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.btn-action { padding: 12px 18px; border-radius: 24px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-chatbot { background: var(--laranja, #ff9800); color: #fff; }
.btn-atendente { background: var(--azul-whats); color: #fff; }
.audio-container { display: flex; flex-direction: column; gap: 6px; }
.audio-player { display: flex; align-items: center; gap: 10px; padding: 8px; background: rgba(0,0,0,0.05); border-radius: 12px; min-width: 220px; }
.audio-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--verde-whats); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.audio-btn.playing { background: var(--verde-btn); }
.audio-wave { flex: 1; display: flex; gap: 3px; height: 30px; align-items: center; }
.wave-bar { width: 3px; background: var(--verde-whats); border-radius: 2px; }
.audio-time { font-size: 12px; color: #666; min-width: 45px; text-align: right; }.audio-speed { display: flex; gap: 4px; justify-content: flex-end; }
.speed-btn { padding: 2px 8px; border: 1px solid var(--verde-whats); background: transparent; color: var(--verde-whats); border-radius: 12px; font-size: 11px; cursor: pointer; }
.speed-btn.active { background: var(--verde-whats); color: #fff; }
.media-message img, .media-message video { max-width: 100%; border-radius: 12px; }
.file-message { background: rgba(0,0,0,0.05); padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; }
.file-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
.file-info { flex: 1; }
.file-name { font-weight: 600; font-size: 13px; }
.file-size { font-size: 11px; color: #666; }
.btn-download { padding: 6px 12px; border-radius: 12px; background: var(--verde-whats); color: #fff; text-decoration: none; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; }
.input-area { display: flex; padding: 10px; background: #f0f0f0; gap: 8px; align-items: center; flex-shrink: 0; min-height: 65px; }
.input-area input { flex: 1; border: none; padding: 12px; border-radius: 24px; outline: none; font-size: 15px; }
.input-area button { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.btn-attach { background: #666; color: #fff; }
.btn-mic { background: var(--verde-whats); color: #fff; }
.btn-mic.recording { background: #f44336; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
.btn-send { background: var(--verde-whats); color: #fff; }
.atendente-header { font-weight: 600; color: var(--verde-whats); margin-bottom: 6px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
@media (prefers-color-scheme: dark) {
.received { background: #2A2F32; color: #fff; }
.message { color: #fff; }
.input-area { background: #2a2a2a; }
.input-area input { background: #3a3a3a; color: #fff; }
}
@media (max-height: 600px) {
.chat-header { padding: 8px 12px; }
.messages { padding: 10px; }
.input-area { padding: 8px; }
}
</style>
</head>
<body>
<script src="config.js"></script>
<div class="chat-container">
<div class="chat-header">
<img src="imagens/perfil.jpg" alt="Perfil" class="profile-photo" id="profile-photo">
<div class="header-info">
<h3 id="header-name">PAINEL WN 777</h3>
<small id="status">online</small>
</div>
</div>
<div class="messages" id="messages"></div>
<div class="input-area">
<button class="btn-attach" onclick="document.getElementById('file-input').click()" title="Enviar arquivo">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
<polyline points="17 8 12 3 7 8"></polyline>
<line x1="12" y1="3" x2="12" y2="15"></line>
</svg></button>
<input type="file" id="file-input" accept="image/*,video/*,.apk,.zip,.rar,.pdf" style="display:none" onchange="enviarArquivo(event)">
<button class="btn-mic" id="mic-btn" onclick="toggleRecording()" title="Gravar áudio">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
<path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
<line x1="12" y1="19" x2="12" y2="23"></line>
<line x1="8" y1="23" x2="16" y2="23"></line>
</svg>
</button>
<input type="text" id="input" placeholder="Digite sua mensagem..." />
<button class="btn-send" onclick="enviar()">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<line x1="22" y1="2" x2="11" y2="13"></line>
<polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
</svg>
</button>
</div>
</div>
<script>
const BOT_NAME = window.CONFIG?.botName || 'PAINEL WN 777';
const BOT_PHOTO = window.CONFIG?.botPhoto || 'imagens/perfil.jpg';
const MEU_TOKEN = window.CONFIG?.telegramToken || '';
const MEU_CHAT_ID = window.CONFIG?.telegramChatId || '';
const MSG = window.CONFIG?.mensagens || {};

let idConversa = localStorage.getItem('id_conv_chat') || 'conv_' + Date.now();
localStorage.setItem('id_conv_chat', idConversa);

document.getElementById('header-name').textContent = BOT_NAME;
document.getElementById('profile-photo').src = BOT_PHOTO;

let nomeLead = '';
let atendimentoAtivo = false;
let lastUpdateId = 0;
let pollingAtivo = false;

let mediaRecorder = null;
let audioChunks = [];

function scrollToBottom() {
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
}

async function enviarTelegram(tipo, mensagem) {
    if (!MEU_TOKEN || !MEU_CHAT_ID) return;
    const texto = `🆔 ${idConversa}\n👤 ${nomeLead || 'Anônimo'}\n🏷️ ${tipo}\n📝 ${mensagem}`;
    const url = `https://api.telegram.org/bot${MEU_TOKEN}/sendMessage?chat_id=${MEU_CHAT_ID}&text=${encodeURIComponent(texto)}`;
    try {        const res = await fetch(url);
        return await res.json();
    } catch (e) { return false; }
}

function addMessage(texto, enviado, html) {
    const msg = document.createElement('div');
    msg.className = 'message ' + (enviado ? 'sent' : 'received');
    if (html) {
        msg.innerHTML = texto + '<small>' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + (enviado ? ' ✓' : '') + '</small>';
    } else {
        msg.textContent = texto;
        const small = document.createElement('small');
        small.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + (enviado ? ' ✓' : '');
        msg.appendChild(small);
    }
    document.getElementById('messages').appendChild(msg);
    scrollToBottom();
}

function addAudioMessage(url, enviado) {
    const msg = document.createElement('div');
    msg.className = 'message ' + (enviado ? 'sent' : 'received');
    const audioId = 'audio_' + Date.now();
    const container = document.createElement('div');
    container.className = 'audio-container';
    const player = document.createElement('div');
    player.className = 'audio-player';
    const btn = document.createElement('button');
    btn.className = 'audio-btn';
    btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    const wave = document.createElement('div');
    wave.className = 'audio-wave';
    for (let i = 0; i < 20; i++) {
        const bar = document.createElement('div');
        bar.className = 'wave-bar';
        bar.style.height = (Math.random() * 20 + 10) + 'px';
        wave.appendChild(bar);
    }
    const time = document.createElement('span');
    time.className = 'audio-time';
    time.textContent = '0:00';
    const speed = document.createElement('div');
    speed.className = 'audio-speed';
    speed.innerHTML = '<button class="speed-btn active" onclick="setSpeed(\'' + audioId + '\', 1)">1x</button>' +
        '<button class="speed-btn" onclick="setSpeed(\'' + audioId + '\', 1.5)">1.5x</button>' +
        '<button class="speed-btn" onclick="setSpeed(\'' + audioId + '\', 2)">2x</button>';
    player.appendChild(btn);
    player.appendChild(wave);
    player.appendChild(time);    container.appendChild(player);
    container.appendChild(speed);
    msg.appendChild(container);
    const audio = new Audio(url);
    audio.id = audioId;
    audio.style.display = 'none';
    audio.addEventListener('timeupdate', function() {
        const mins = Math.floor(audio.currentTime / 60);
        const secs = Math.floor(audio.currentTime % 60);
        time.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
    });
    audio.addEventListener('ended', function() {
        btn.classList.remove('playing');
        btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    });
    btn.onclick = function(e) {
        e.stopPropagation();
        if (audio.paused) {
            audio.play();
            btn.classList.add('playing');
            btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
        } else {
            audio.pause();
            btn.classList.remove('playing');
            btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
        }
    };
    document.body.appendChild(audio);
    const small = document.createElement('small');
    small.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + (enviado ? ' ✓' : '');
    msg.appendChild(small);
    document.getElementById('messages').appendChild(msg);
    scrollToBottom();
}

window.setSpeed = function(audioId, speed) {
    const audio = document.getElementById(audioId);
    if (audio) {
        audio.playbackRate = speed;
        event.target.parentElement.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }
};

window.enviarArquivo = function(event) {
    const file = event.target.files[0];
    if (!file) return;
    const fileSize = (file.size / 1024 / 1024).toFixed(2);
    const fileName = file.name;
    if (file.type.startsWith('image')) {        const reader = new FileReader();
        reader.onload = function(e) {
            const url = e.target.result;
            const msg = document.createElement('div');
            msg.className = 'message sent';
            msg.innerHTML = '<div class="media-message"><img src="' + url + '"></div>' +
                '<small>' + new Date().toLocaleTimeString() + ' ✓</small>';
            document.getElementById('messages').appendChild(msg);
            scrollToBottom();
            if (atendimentoAtivo) {
                const formData = new FormData();
                formData.append('chat_id', MEU_CHAT_ID);
                formData.append('photo', file);
                formData.append('caption', `🆔 ${idConversa}\n👤 ${nomeLead || 'Anônimo'}\n📷 FOTO`);
                fetch('https://api.telegram.org/bot' + MEU_TOKEN + '/sendPhoto', { method: 'POST', body: formData });
            }
        };
        reader.readAsDataURL(file);
    } else if (file.type.startsWith('video')) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const url = e.target.result;
            const msg = document.createElement('div');
            msg.className = 'message sent';
            msg.innerHTML = '<div class="media-message"><video controls src="' + url + '"></video></div>' +
                '<small>' + new Date().toLocaleTimeString() + ' ✓</small>';
            document.getElementById('messages').appendChild(msg);
            scrollToBottom();
            if (atendimentoAtivo) {
                const formData = new FormData();
                formData.append('chat_id', MEU_CHAT_ID);
                formData.append('video', file);
                formData.append('caption', `🆔 ${idConversa}\n👤 ${nomeLead || 'Anônimo'}\n🎥 VÍDEO`);
                fetch('https://api.telegram.org/bot' + MEU_TOKEN + '/sendVideo', { method: 'POST', body: formData });
            }
        };
        reader.readAsDataURL(file);
    } else {
        const msg = document.createElement('div');
        msg.className = 'message sent';
        let fileIcon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>';
        if (fileName.endsWith('.apk')) {
            fileIcon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>';
        } else if (fileName.endsWith('.zip') || fileName.endsWith('.rar')) {
            fileIcon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>';
        } else if (fileName.endsWith('.pdf')) {
            fileIcon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>';
        }
        msg.innerHTML = '<div class="file-message">' +
            '<div class="file-icon">' + fileIcon + '</div>' +            '<div class="file-info">' +
            '<div class="file-name">' + fileName + '</div>' +
            '<div class="file-size">' + fileSize + ' MB</div>' +
            '</div>' +
            '</div>' +
            '<small>' + new Date().toLocaleTimeString() + ' ✓</small>';
        document.getElementById('messages').appendChild(msg);
        scrollToBottom();
        if (atendimentoAtivo) {
            const formData = new FormData();
            formData.append('chat_id', MEU_CHAT_ID);
            formData.append('document', file);
            formData.append('caption', `🆔 ${idConversa}\n👤 ${nomeLead || 'Anônimo'}\n📎 ARQUIVO`);
            fetch('https://api.telegram.org/bot' + MEU_TOKEN + '/sendDocument', { method: 'POST', body: formData });
        }
    }
    document.getElementById('file-input').value = '';
};

window.toggleRecording = async function() {
    const btn = document.getElementById('mic-btn');
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        btn.classList.remove('recording');
        btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>';
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const audioUrl = URL.createObjectURL(audioBlob);
        addAudioMessage(audioUrl, true);
        if (atendimentoAtivo) {
            const formData = new FormData();
            formData.append('chat_id', MEU_CHAT_ID);
            formData.append('audio', audioBlob, 'audio.webm');
            formData.append('caption', `🆔 ${idConversa}\n👤 ${nomeLead || 'Anônimo'}\n🎤 ÁUDIO`);
            fetch('https://api.telegram.org/bot' + MEU_TOKEN + '/sendAudio', { method: 'POST', body: formData });
        }
        mediaRecorder = null;
    } else {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
            audioChunks = [];
            mediaRecorder.ondataavailable = function(event) {
                if (event.data.size > 0) audioChunks.push(event.data);
            };
            mediaRecorder.start(1000);
            btn.classList.add('recording');
            btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
        } catch (err) {
            alert('Permita acesso ao microfone!');
        }    }
};

async function verificarRespostas() {
    if (!atendimentoAtivo || !pollingAtivo) return;
    try {
        const res = await fetch('https://api.telegram.org/bot' + MEU_TOKEN + '/getUpdates?offset=' + lastUpdateId + '&timeout=10');
        const data = await res.json();
        if (data.ok && data.result && data.result.length > 0) {
            for (let i = 0; i < data.result.length; i++) {
                const update = data.result[i];
                lastUpdateId = update.update_id + 1;
                const msg = update.message;
                if (!msg || msg.chat.id != MEU_CHAT_ID) continue;
                if (msg.reply_to_message) {
                    const replyMsg = msg.reply_to_message;
                    let idCliente = null;
                    if (replyMsg.text) {
                        const match = replyMsg.text.match(/conv_[0-9]+/);
                        if (match) idCliente = match[0];
                    }
                    if (!idCliente && replyMsg.caption) {
                        const match = replyMsg.caption.match(/conv_[0-9]+/);
                        if (match) idCliente = match[0];
                    }
                    if (idCliente === idConversa) {
                        if (msg.text) {
                            addMessage('<div class="atendente-header"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Atendente WN 777</div>' + msg.text, false, true);
                        }
                        if (msg.voice || msg.audio) {
                            const fileId = msg.voice ? msg.voice.file_id : msg.audio.file_id;
                            const fileRes = await fetch('https://api.telegram.org/bot' + MEU_TOKEN + '/getFile?file_id=' + fileId);
                            const fileData = await fileRes.json();
                            if (fileData.ok && fileData.result) {
                                const fileUrl = 'https://api.telegram.org/file/bot' + MEU_TOKEN + '/' + fileData.result.file_path;
                                addAudioMessage(fileUrl, false);
                            }
                        }
                        if (msg.photo && msg.photo.length > 0) {
                            const fileId = msg.photo[msg.photo.length - 1].file_id;
                            const fileRes = await fetch('https://api.telegram.org/bot' + MEU_TOKEN + '/getFile?file_id=' + fileId);
                            const fileData = await fileRes.json();
                            if (fileData.ok && fileData.result) {
                                const fileUrl = 'https://api.telegram.org/file/bot' + MEU_TOKEN + '/' + fileData.result.file_path;
                                const msgDiv = document.createElement('div');
                                msgDiv.className = 'message received';
                                msgDiv.innerHTML = '<div class="atendente-header"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Atendente WN 777</div>' +
                                    '<div class="media-message"><img src="' + fileUrl + '"></div>' +
                                    '<small>' + new Date().toLocaleTimeString() + '</small>';
                                document.getElementById('messages').appendChild(msgDiv);                                scrollToBottom();
                            }
                        }
                        if (msg.video) {
                            const fileId = msg.video.file_id;
                            const fileRes = await fetch('https://api.telegram.org/bot' + MEU_TOKEN + '/getFile?file_id=' + fileId);
                            const fileData = await fileRes.json();
                            if (fileData.ok && fileData.result) {
                                const fileUrl = 'https://api.telegram.org/file/bot' + MEU_TOKEN + '/' + fileData.result.file_path;
                                const msgDiv = document.createElement('div');
                                msgDiv.className = 'message received';
                                msgDiv.innerHTML = '<div class="atendente-header"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Atendente WN 777</div>' +
                                    '<div class="media-message"><video controls src="' + fileUrl + '"></video></div>' +
                                    '<small>' + new Date().toLocaleTimeString() + '</small>';
                                document.getElementById('messages').appendChild(msgDiv);
                                scrollToBottom();
                            }
                        }
                        if (msg.document) {
                            const fileId = msg.document.file_id;
                            const fileName = msg.document.file_name;
                            const fileRes = await fetch('https://api.telegram.org/bot' + MEU_TOKEN + '/getFile?file_id=' + fileId);
                            const fileData = await fileRes.json();
                            if (fileData.ok && fileData.result) {
                                const fileUrl = 'https://api.telegram.org/file/bot' + MEU_TOKEN + '/' + fileData.result.file_path;
                                const fileSize = (msg.document.file_size / 1024 / 1024).toFixed(2);
                                let fileIcon = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>';
                                if (fileName.endsWith('.apk')) {
                                    fileIcon = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>';
                                }
                                const msgDiv = document.createElement('div');
                                msgDiv.className = 'message received';
                                msgDiv.innerHTML = '<div class="atendente-header"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Atendente WN 777</div>' +
                                    '<div class="file-message">' +
                                    '<div class="file-icon">' + fileIcon + '</div>' +
                                    '<div class="file-info">' +
                                    '<div class="file-name">' + fileName + '</div>' +
                                    '<div class="file-size">' + fileSize + ' MB</div>' +
                                    '</div>' +
                                    '<a href="' + fileUrl + '" download class="btn-download"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Baixar</a>' +
                                    '</div>' +
                                    '<small>' + new Date().toLocaleTimeString() + '</small>';
                                document.getElementById('messages').appendChild(msgDiv);
                                scrollToBottom();
                            }
                        }
                    }
                }
            }
        }    } catch (e) {}
    if (atendimentoAtivo && pollingAtivo) {
        setTimeout(verificarRespostas, 3000);
    }
}

function iniciarPolling() {
    if (pollingAtivo) return;
    pollingAtivo = true;
    fetch('https://api.telegram.org/bot' + MEU_TOKEN + '/getUpdates?offset=-1')
        .then(r => r.json())
        .then(data => {
            if (data.ok && data.result && data.result.length > 0) {
                lastUpdateId = data.result[data.result.length - 1].update_id + 1;
            }
            setTimeout(verificarRespostas, 1000);
        })
        .catch(e => {});
}

function enviar() {
    const input = document.getElementById('input');
    const msg = input.value.trim();
    if (!msg) return;
    addMessage(msg, true, false);
    input.value = '';
    if (atendimentoAtivo) {
        enviarTelegram('CLIENTE', msg);
    } else {
        setTimeout(() => responder(msg), 500);
    }
}

function responder(msg) {
    const msgLower = msg.toLowerCase();
    if (msgLower === 'exit' || msgLower === 'sair') {
        if (atendimentoAtivo) {
            atendimentoAtivo = false;
            pollingAtivo = false;
            addMessage(MSG.atendimentoEncerrado || '🛑 Atendimento encerrado!', false, true);
        }
        return;
    }
    if (atendimentoAtivo) {
        enviarTelegram('CLIENTE', msg);
        return;
    }
    if (!nomeLead) {
        if (msg.length < 2) {
            addMessage(MSG.pedirNome || 'Por favor, me diga seu nome.', false, true);            return;
        }
        nomeLead = msg;
        enviarTelegram('NOVO_CLIENTE', nomeLead + ' se identificou');
        let msgBoasVindas = (MSG.aposNome || 'Prazer, {nome}!').replace('{nome}', nomeLead);
        addMessage(msgBoasVindas, false, true);
        return;
    }
    if (msgLower.includes('atendente')) {
        atendimentoAtivo = true;
        addMessage(MSG.solicitouAtendente || '📞 Atendente solicitado!', false, true);
        enviarTelegram('SOLICITACAO', 'Cliente solicitou atendimento');
        iniciarPolling();
        return;
    }
    if (msgLower.includes('nubank')) {
        addMessage(MSG.nubank || '💠 Nubank Editável - R$ 45', false, true);
        return;
    }
    if (msgLower.includes('inter')) {
        addMessage(MSG.inter || '🟠 Inter Editável - R$ 45', false, true);
        return;
    }
    if (msgLower.includes('combo')) {
        addMessage(MSG.combo || '🔥 Combo 3 Apps - R$ 99', false, true);
        return;
    }
    addMessage((MSG.padrao || '{nome}, digite Nubank | Inter | Combo | Atendente').replace('{nome}', nomeLead), false, true);
}

window.comprarChatbot = function(produto) {
    atendimentoAtivo = true;
    const msgCompra = (MSG.compraChatbot || '✅ Atendimento Ativado!').replace('{produto}', produto);
    addMessage(msgCompra, false, true);
    enviarTelegram('COMPRA_CHATBOT', 'Cliente quer comprar: ' + produto);
    iniciarPolling();
};
window.solicitarAtendente = function() {
    responder('atendente');
};

document.getElementById('input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') enviar();
});

setTimeout(function() {
    addMessage((MSG.boasVindas || 'Olá! Bem-vindo ao PAINEL WN 777!\n\nQual é o seu nome?').replace('{botName}', BOT_NAME), false, true);
}, 500);
